  <!-- consultancy text -->
  <text x="72" y="84" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="24" fill="#2D4A3E" letter-spacing="3">consultancy</text>
</svg>
